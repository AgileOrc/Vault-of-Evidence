services:
  postgres:
    image: postgres:16-alpine
    container_name: voe_postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        export POSTGRES_USER="$${DB_USER}"
        export POSTGRES_PASSWORD="$${DB_PASSWORD}"
        export POSTGRES_DB="$${DB_NAME}"
        exec docker-entrypoint.sh postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${DB_USER}\" -d \"$${DB_NAME}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voe_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - evidence_storage:/app/storage/evidence

volumes:
  postgres_data:
  evidence_storage:
